# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "37 7 * * WED" # run at 7:37am UTC on Wednesdays

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-26,   r: 'release'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}
          - {os: ubuntu-latest,   r: 'oldrel-2'}
          - {os: ubuntu-latest,   r: 'oldrel-3'}
          # - {os: ubuntu-24.04-arm, r: 'release' }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: ${{ matrix.config.rspm || 'true' }}

      - name: Set parallel compilation flags (Linux and macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          NCPUS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          echo "Detected ${NCPUS} processors"
          echo "MAKEFLAGS=-j${NCPUS}" >> ~/.Renviron

      - name: Set parallel compilation flags (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Output "Detected $env:NUMBER_OF_PROCESSORS processors"
          Add-Content -Path "$HOME\.Renviron" -Value "MAKEFLAGS=-j$env:NUMBER_OF_PROCESSORS"

      # ccache speeds up Stan model compilation dramatically on warm cache.
      # Note: Windows support via ccache-action is documented as "probably works"
      # rather than fully stable; if it causes issues, scope this step to non-Windows.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          # Key invalidates when Stan models or DESCRIPTION change.
          # Older caches partially seed new ones via restore-keys.
          key: ccache-${{ matrix.config.os }}-R-${{ matrix.config.r }}-${{ hashFiles('inst/stan/**/*.stan', 'DESCRIPTION') }}
          restore-keys: |
            ccache-${{ matrix.config.os }}-R-${{ matrix.config.r }}-
            ccache-${{ matrix.config.os }}-R-
          max-size: "2G"

      - name: Configure R to use ccache (Linux and macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ~/.R
          if [ "$RUNNER_OS" = "macOS" ]; then
            cat >> ~/.R/Makevars <<'EOF'
          CC = ccache clang
          CXX = ccache clang++
          CXX14 = ccache clang++
          CXX17 = ccache clang++
          CXX20 = ccache clang++
          EOF
          else
            cat >> ~/.R/Makevars <<'EOF'
          CC = ccache gcc
          CXX = ccache g++
          CXX14 = ccache g++
          CXX17 = ccache g++
          CXX20 = ccache g++
          EOF
          fi
          echo "--- ~/.R/Makevars ---"
          cat ~/.R/Makevars

      - name: Configure R to use ccache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.R" | Out-Null
          $makevars = @"
          CC = ccache gcc
          CXX = ccache g++
          CXX14 = ccache g++
          CXX17 = ccache g++
          CXX20 = ccache g++
          "@
          Add-Content -Path "$HOME\.R\Makevars.win" -Value $makevars
          Write-Output "--- ~/.R/Makevars.win ---"
          Get-Content "$HOME\.R\Makevars.win"

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install jags

      - name: Set macOS OpenMP env var to prevent duplicate libomp crash
        if: runner.os == 'macOS'
        run: echo "KMP_DUPLICATE_LIB_OK=TRUE" >> $GITHUB_ENV

      - name: Install data.table from source on macOS if no binary available
        if: runner.os == 'macOS'
        run: |
          HAS_BINARY=$(Rscript -e "pkgs <- tryCatch(available.packages(type='binary'), error=function(e) matrix(NA,0,0)); cat(if ('data.table' %in% rownames(pkgs)) 'yes' else 'no')")
          if [ "$HAS_BINARY" = "no" ]; then
            echo "CPPFLAGS = -I$(brew --prefix gettext)/include" >> ~/.R/Makevars
            Rscript -e "install.packages('data.table', type='source')"
          fi

      - name: Cache JAGS install (Windows)
        if: runner.os == 'Windows'
        id: cache-jags-windows
        uses: actions/cache@v6
        with:
          path: C:\Program Files\JAGS\JAGS-4.3.1
          key: jags-windows-4.3.1

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        run: |
          # Install JAGS based on CRAN script
          # https://svn.r-project.org/R-dev-web/trunk/WindowsBuilds/winutf8/ucrt3/r_packages/setup_checks.ps1
          if (-not(Test-Path("C:\Program Files\JAGS\JAGS-4.3.1"))) {
            mkdir temp
            cd temp
            $url = "https://sourceforge.net/projects/mcmc-jags/files/JAGS/4.x/Windows/JAGS-4.3.1.exe/download"
            $inst = "..\installers\JAGS-4.3.1.exe"

            if (Test-Path("$inst")) {
              cp "$inst" jags.exe
            } elseif (-not(Test-path("jags.exe"))) {
              # -A "NativeHost" to work-around issues with redirects with the default
              curl.exe -L -A "NativeHost" -o jags.exe "$url"
            }
            Start-Process -Wait -NoNewWindow -FilePath ".\jags.exe" -ArgumentList "/S"
            cd ..
            Remove-Item -LiteralPath "temp" -Force -Recurse
          }

      - name: Set pak options
        shell: bash
        run: echo 'options(pkg.sysreqs_db_update_timeout = as.difftime(59, units = "secs"))' >> ~/.Rprofile

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, MendelianRandomization=?ignore-before-r=4.4.0
          needs: check
          upgrade: 'TRUE'

      - name: Get R library path (macOS)
        if: runner.os == 'macOS'
        id: r-libpath-macos
        shell: bash
        run: |
          LIBPATH=$(Rscript -e 'cat(.libPaths()[1])')
          echo "Detected R library path: $LIBPATH"
          echo "libpath=$LIBPATH" >> $GITHUB_OUTPUT

      - name: Cache rstan and rjags (macOS)
        if: runner.os == 'macOS'
        id: cache-rstan-rjags
        uses: actions/cache@v6
        with:
          path: |
            ${{ steps.r-libpath-macos.outputs.libpath }}/rstan
            ${{ steps.r-libpath-macos.outputs.libpath }}/rjags
            ${{ steps.r-libpath-macos.outputs.libpath }}/StanHeaders
          key: rstan-rjags-${{ matrix.config.os }}-R-${{ matrix.config.r }}-v1

      - name: Install rstan and rjags from source on macOS
        if: runner.os == 'macOS' && steps.cache-rstan-rjags.outputs.cache-hit != 'true'
        run: install.packages(c('rstan', 'rjags'), type = 'source')
        shell: Rscript {0}

      - name: Show ccache stats before check
        shell: bash
        run: ccache -s

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"error"'

      - name: Show ccache stats after check
        if: always()
        shell: bash
        run: ccache -s
